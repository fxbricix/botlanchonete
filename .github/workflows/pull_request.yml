name: Validador Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_DAT_HOST_EMAIL: ${{ secrets.VITE_DAT_HOST_EMAIL }}
          VITE_DAT_HOST_PASSWORD: ${{ secrets.VITE_DAT_HOST_PASSWORD }}
          VITE_TRACK_SERVER_ID: ${{ secrets.VITE_TRACK_SERVER_ID }}
          VITE_TRACK_INTERVAL_SEC: ${{ secrets.VITE_TRACK_INTERVAL_SEC }}
          VITE_SERVER_IP: ${{ secrets.VITE_SERVER_IP }}

      - name: Run tests
        run: npm test