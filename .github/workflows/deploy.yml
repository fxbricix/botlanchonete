name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: npm run build
        env:
          VITE_DAT_HOST_EMAIL: ${{ secrets.VITE_DAT_HOST_EMAIL }}
          VITE_DAT_HOST_PASSWORD: ${{ secrets.VITE_DAT_HOST_PASSWORD }}
          VITE_TRACK_SERVER_ID: ${{ secrets.VITE_TRACK_SERVER_ID }}
          VITE_TRACK_INTERVAL_SEC: ${{ secrets.VITE_TRACK_INTERVAL_SEC }}
          VITE_SERVER_IP: ${{ secrets.VITE_SERVER_IP }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
